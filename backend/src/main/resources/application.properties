# ===================== HALYCON CAFE BACKEND CONFIG =====================

server.port=8080

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/halycon_cafe?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
# 256-bit+ secret. Replace before production. Generate with: openssl rand -base64 64
app.jwt.secret=REPLACE_WITH_A_LONG_RANDOM_BASE64_SECRET_AT_LEAST_64_BYTES_LONG
app.jwt.expiration-ms=86400000

# ---- Razorpay ----
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173

# ---- File upload (menu images) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
